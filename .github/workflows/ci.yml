name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run targeted Python tests
        run: |
          pytest -q \
            tests/test_x_tool.py \
            tests/test_conversation_runtime.py \
            tests/test_tool_approval.py \
            tests/test_conversation_engine.py \
            tests/test_system_prompt_builder.py

  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Rust TUI
        run: cargo build --release --manifest-path crates/charon-tui/Cargo.toml
